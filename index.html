<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SK Inventory</title>

    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="css/style.css">

    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Myanmar:wght@400;500;700&display=swap" rel="stylesheet">
</head>

<body>

<!-- App Bar -->
<header class="app-bar">

    <div class="title-area">

        <h1>SK Inventory</h1>

        <small id="summaryText">
            ဘေထုတ် 0 ခု • အထည် 0 ထည်
        </small>

    </div>

    <div class="actions">

        <button id="searchBtn">
            🔍
        </button>

        <button id="addBundleBtn">
            ➕
        </button>

    </div>

</header>


<!-- Search -->
<div id="searchBox" class="search-box hidden">

    <input
        type="text"
        id="searchInput"
        placeholder="A001 ဖြင့်ရှာရန်">

</div>


<!-- Profit Card -->

<section class="profit-card">

    <span>စုစုပေါင်းအမြတ်</span>

    <h2 id="totalProfit">0 ကျပ်</h2>

</section>


<!-- Bundle List -->

<main id="bundleList">

</main>


<!-- Bottom Navigation -->

<nav class="bottom-nav">

    <button class="active">
        📦
        <span>ဘေထုတ်များ</span>
    </button>

    <button>
        📊
        <span>အစီရင်ခံစာ</span>
    </button>

    <button>
        ⚙️
        <span>ဆက်တင်</span>
    </button>

</nav>



<script src="js/db.js"></script>
<script src="js/dashboard.js"></script>

</body>
</html>
