<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bundle Items - SK Inventory Pro</title>

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<header>
    <h2 id="bundleTitle">Bundle</h2>

    <button onclick="location.href='index.html'">
        ⬅ Dashboard
    </button>
</header>

<section class="item-form">

    <input
        type="text"
        id="code"
        placeholder="Item Code (A001)">

    <input
        type="number"
        id="cost"
        placeholder="Cost Price">

    <input
        type="number"
        id="price"
        placeholder="Selling Price">

    <button id="saveItemBtn">
        ➕ Save Item
    </button>

</section>

<section>

    <table>

        <thead>

        <tr>

            <th>Code</th>
            <th>Cost</th>
            <th>Price</th>
            <th>Status</th>
            <th>Action</th>

        </tr>

        </thead>

        <tbody id="itemTable"></tbody>

    </table>

</section>

<script src="js/db.js"></script>
<script src="js/items.js"></script>

</body>
</html>
